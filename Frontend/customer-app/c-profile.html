<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Profile - FoodDash</title>
  <link rel="stylesheet" href="c-shared.css">
</head>
<body>
  <header id="customer-topbar" class="c-topbar"></header>

  <main class="page-container">
    <section class="page-header">
      <div>
        <p class="eyebrow">Customer management</p>
        <h1 class="page-title">My Profile</h1>
        <p class="page-subtitle">View and update the customer details stored in users.txt through the Spring Boot customer endpoints.</p>
      </div>
      <a class="btn-secondary" href="c-login.html" onclick="customerLogout(); return false;">Logout</a>
    </section>

    <section class="profile-layout">
      <form id="profile-form" class="panel" novalidate>
        <h2>Account Details</h2>
        <div class="form-grid">
          <div class="form-group">
            <label class="form-label" for="personId">Customer ID</label>
            <input type="text" id="personId" class="form-input" disabled>
          </div>
          <div class="form-group">
            <label class="form-label" for="email">Email</label>
            <input type="email" id="email" class="form-input" disabled>
          </div>
          <div class="form-group">
            <label class="form-label" for="name">Full name</label>
            <input type="text" id="name" class="form-input" required>
          </div>
          <div class="form-group">
            <label class="form-label" for="phone">Phone</label>
            <input type="tel" id="phone" class="form-input" required>
          </div>
          <div class="form-group full">
            <label class="form-label" for="address">Delivery address</label>
            <textarea id="address" class="form-textarea" required></textarea>
          </div>
        </div>
        <div class="actions-row">
          <button class="btn-primary" type="submit">Save Changes</button>
          <button class="btn-outline" type="button" id="reload-btn">Reload</button>
        </div>
        <p id="profile-msg" class="success-msg" role="status"></p>
        <p id="profile-error" class="error-msg" role="alert"></p>
      </form>

      <aside class="panel">
        <h2>Session Summary</h2>
        <div class="meta-list">
          <div class="meta-item"><span class="meta-label">Role</span><span class="meta-value" id="role-value">CUSTOMER</span></div>
          <div class="meta-item"><span class="meta-label">Storage file</span><span class="meta-value">users.txt</span></div>
          <div class="meta-item"><span class="meta-label">Required fields</span><span class="meta-value">10</span></div>
          <div class="meta-item"><span class="meta-label">Data type</span><span class="meta-value">Customer</span></div>
        </div>
      </aside>
    </section>
  </main>

  <script src="c-shell.js"></script>
  <script>
    const sessionCustomer = getCustomerSession();

    function setMessage(message, isError) {
      document.getElementById('profile-msg').textContent = isError ? '' : message;
      document.getElementById('profile-error').textContent = isError ? message : '';
    }

    function fillForm(customer) {
      document.getElementById('personId').value = customer.personId || '';
      document.getElementById('email').value = customer.email || '';
      document.getElementById('name').value = customer.name || '';
      document.getElementById('phone').value = customer.phone || '';
      document.getElementById('address').value = customer.address || '';
      document.getElementById('role-value').textContent = customer.role || 'CUSTOMER';
    }

    async function loadProfile() {
      setMessage('', false);
      try {
        const fresh = await customerApi.get('/customers/' + encodeURIComponent(sessionCustomer.personId));
        const merged = { ...sessionCustomer, ...fresh, role: 'CUSTOMER' };
        saveCustomerSession(merged);
        fillForm(merged);
      } catch (error) {
        fillForm(sessionCustomer);
        setMessage('Loaded saved session. Backend profile lookup is unavailable.', true);
      }
    }

    document.getElementById('profile-form').addEventListener('submit', async function (event) {
      event.preventDefault();
      const body = {
        name: document.getElementById('name').value.trim(),
        phone: document.getElementById('phone').value.trim(),
        address: document.getElementById('address').value.trim()
      };
      if (!body.name || !body.phone || !body.address) {
        setMessage('Name, phone, and address are required.', true);
        return;
      }
      try {
        const updated = await customerApi.put('/customers/' + encodeURIComponent(sessionCustomer.personId), body);
        const nextSession = { ...sessionCustomer, ...updated, role: 'CUSTOMER' };
        saveCustomerSession(nextSession);
        fillForm(nextSession);
        setMessage('Profile updated successfully.', false);
      } catch (error) {
        setMessage(error.message || 'Unable to update profile.', true);
      }
    });

    document.getElementById('reload-btn').addEventListener('click', loadProfile);
    loadProfile();
  </script>
</body>
</html>
