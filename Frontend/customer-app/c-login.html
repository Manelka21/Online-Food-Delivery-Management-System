<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Customer Login - FoodDash</title>
  <link rel="stylesheet" href="c-shared.css">
</head>
<body class="auth-page">
  <main class="auth-card" aria-labelledby="login-title">
    <div class="auth-mark">FD</div>
    <h1 class="auth-title" id="login-title">FoodDash</h1>
    <p class="auth-subtitle">Sign in to manage your customer account.</p>

    <form id="login-form" novalidate>
      <div class="form-group">
        <label class="form-label" for="email">Email address</label>
        <input type="email" id="email" class="form-input" autocomplete="email" placeholder="amal@gmail.com" required>
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input type="password" id="password" class="form-input" autocomplete="current-password" placeholder="1234" required>
      </div>
      <p id="error-msg" class="error-msg" role="alert"></p>
      <button class="btn-primary full-width" type="submit">Sign In</button>
    </form>

    <p class="auth-link">New customer? <a href="c-signup.html">Create an account</a></p>
  </main>

  <script src="c-shell.js"></script>
  <script>
    document.getElementById('login-form').addEventListener('submit', async function (event) {
      event.preventDefault();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();
      const errorEl = document.getElementById('error-msg');
      errorEl.textContent = '';

      if (!email || !password) {
        errorEl.textContent = 'Please enter both email and password.';
        return;
      }

      try {
        const response = await fetch('http://localhost:8080/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        if (!response.ok) throw new Error('Invalid email or password.');
        const user = await response.json();
        if (user.role !== 'CUSTOMER') {
          errorEl.textContent = 'This page is only for customer accounts.';
          return;
        }
        localStorage.setItem('customer', JSON.stringify(user));
        window.location.href = 'c-profile.html';
      } catch (error) {
        errorEl.textContent = error.message === 'Failed to fetch'
          ? 'Cannot connect to the backend on port 8080.'
          : error.message;
      }
    });
  </script>
</body>
</html>
