<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Sign Up - FoodDash</title>
  <link rel="stylesheet" href="shared.css">
</head>
<body class="admin-auth-page">
  <main class="admin-login-card" aria-labelledby="admin-signup-title">
    <h1 id="admin-signup-title">Admin Registration</h1>
    <p>Create a new administrator account.</p>
    <form id="admin-signup-form" novalidate>
      <div class="form-group">
        <label class="form-label" for="name">Full Name</label>
        <input type="text" id="name" class="form-input" placeholder="Enter your name" required>
      </div>
      <div class="form-group">
        <label class="form-label" for="email">Email</label>
        <input type="email" id="email" class="form-input" autocomplete="email" placeholder="admin@fooddash.com" required>
      </div>
      <div class="form-group">
        <label class="form-label" for="phone">Phone</label>
        <input type="tel" id="phone" class="form-input" placeholder="+94XXXXXXXXX" required>
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input type="password" id="password" class="form-input" autocomplete="new-password" placeholder="Choose a strong password" required>
      </div>
      <p id="error-msg" class="error-msg" role="alert"></p>
      <button class="btn-primary full-width" type="submit">Register Admin</button>
    </form>
    <p class="auth-link">Already have an account? <a href="login.html">Sign in</a></p>
  </main>

  <script>
    document.getElementById('admin-signup-form').addEventListener('submit', async function (event) {
      event.preventDefault();
      const body = {
        name: document.getElementById('name').value.trim(),
        email: document.getElementById('email').value.trim(),
        phone: document.getElementById('phone').value.trim(),
        password: document.getElementById('password').value.trim()
      };
      const errorEl = document.getElementById('error-msg');
      errorEl.textContent = '';

      if (!body.name || !body.email || !body.phone || !body.password) {
        errorEl.textContent = 'Please fill in all fields.';
        return;
      }

      try {
        const response = await fetch('http://localhost:8080/auth/admin/signup', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });
        const payload = await response.json();
        if (!response.ok) throw new Error(payload.error || 'Registration failed.');
        
        alert('Admin registration successful! Please login.');
        window.location.href = 'login.html';
      } catch (error) {
        errorEl.textContent = error.message === 'Failed to fetch'
          ? 'Cannot connect to the backend on port 8080.'
          : error.message;
      }
    });
  </script>
</body>
</html>
