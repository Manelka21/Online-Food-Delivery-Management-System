<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login - FoodDash</title>
  <link rel="stylesheet" href="shared.css">
</head>
<body class="admin-auth-page">
  <main class="admin-login-card" aria-labelledby="admin-login-title">
    <h1 id="admin-login-title">FoodDash Admin</h1>
    <p>Sign in to the customer management portal.</p>
    <form id="admin-login-form" novalidate>
      <div class="form-group">
        <label class="form-label" for="email">Email</label>
        <input type="email" id="email" class="form-input" autocomplete="email" placeholder="amal@gmail.com" required>
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input type="password" id="password" class="form-input" autocomplete="current-password" placeholder="1234" required>
      </div>
      <p id="error-msg" class="error-msg" role="alert"></p>
      <button class="btn-primary full-width" type="submit">Sign In</button>
    </form>
    <p class="auth-link">New administrator? <a href="signup.html">Create an account</a></p>
  </main>

  <script>
    document.getElementById('admin-login-form').addEventListener('submit', async function (event) {
      event.preventDefault();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();
      const errorEl = document.getElementById('error-msg');
      errorEl.textContent = '';

      if (!email || !password) {
        errorEl.textContent = 'Please enter both email and password.';
        return;
      }

      try {
        const response = await fetch('http://localhost:8080/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        if (!response.ok) throw new Error('Invalid credentials.');
        const user = await response.json();
        
        if (user.role !== 'ADMIN') {
          errorEl.textContent = 'Access denied. This portal is for administrators only.';
          return;
        }

        sessionStorage.setItem('adminUser', JSON.stringify(user));
        window.location.href = 'dashboard.html';
      } catch (error) {
        errorEl.textContent = error.message === 'Failed to fetch'
          ? 'Cannot connect to the backend on port 8080.'
          : error.message;
      }
    });
  </script>
</body>
</html>
