<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Customers - FoodDash Admin</title>
  <link rel="stylesheet" href="shared.css">
</head>
<body>
  <div class="admin-layout">
    <aside id="sidebar" class="sidebar"></aside>
    <main class="main-content">
      <section class="page-header">
        <div>
          <p class="eyebrow">users.txt CRUD</p>
          <h1 class="page-title">Customers</h1>
          <p class="page-subtitle">Create, view, update, and delete customer records using the /customers endpoints.</p>
        </div>
        <button class="btn-secondary" type="button" id="new-customer-btn">New Customer</button>
      </section>

      <section class="management-grid">
        <form id="customer-form" class="card" novalidate>
          <h2 id="form-title">Add Customer</h2>
          <input type="hidden" id="editing-id">
          <div class="form-group">
            <label class="form-label" for="personId">Customer ID</label>
            <input type="text" id="personId" class="form-input" placeholder="Generated by backend" disabled>
          </div>
          <div class="form-group">
            <label class="form-label" for="name">Full name</label>
            <input type="text" id="name" class="form-input" required>
          </div>
          <div class="form-group">
            <label class="form-label" for="email">Email</label>
            <input type="email" id="email" class="form-input" required>
          </div>
          <div class="form-group" id="password-group">
            <label class="form-label" for="password">Password</label>
            <input type="password" id="password" class="form-input" placeholder="Required for new customers">
          </div>
          <div class="form-group">
            <label class="form-label" for="phone">Phone</label>
            <input type="tel" id="phone" class="form-input" required>
          </div>
          <div class="form-group">
            <label class="form-label" for="address">Address</label>
            <textarea id="address" class="form-textarea" required></textarea>
          </div>
          <div class="actions-row">
            <button class="btn-primary" type="submit">Save Customer</button>
            <button class="btn-outline" type="button" id="reset-btn">Clear</button>
          </div>
          <p id="form-success" class="success-msg" role="status"></p>
          <p id="form-error" class="error-msg" role="alert"></p>
        </form>

        <section class="table-card">
          <div class="toolbar">
            <strong>Customer Records</strong>
            <input type="search" id="search" class="form-input search-input" placeholder="Search name, email, phone">
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>ID</th>
                  <th>Name</th>
                  <th>Email</th>
                  <th>Phone</th>
                  <th>Address</th>
                  <th>Status</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="customers-body">
                <tr><td colspan="7" class="empty-row">Loading customers...</td></tr>
              </tbody>
            </table>
          </div>
        </section>
      </section>
    </main>
  </div>

  <script src="shell.js"></script>
  <script>
    let customers = [];

    function setFormMessage(message, isError) {
      document.getElementById('form-success').textContent = isError ? '' : message;
      document.getElementById('form-error').textContent = isError ? message : '';
    }

    function resetForm() {
      document.getElementById('customer-form').reset();
      document.getElementById('editing-id').value = '';
      document.getElementById('personId').value = '';
      document.getElementById('email').disabled = false;
      document.getElementById('password-group').style.display = 'grid';
      document.getElementById('form-title').textContent = 'Add Customer';
      setFormMessage('', false);
    }

    function renderCustomers() {
      const query = document.getElementById('search').value.trim().toLowerCase();
      const visible = customers.filter(function (customer) {
        return [customer.personId, customer.name, customer.email, customer.phone, customer.address]
          .join(' ')
          .toLowerCase()
          .includes(query);
      });
      const tbody = document.getElementById('customers-body');
      if (!visible.length) {
        tbody.innerHTML = '<tr><td colspan="7" class="empty-row">No customer records found.</td></tr>';
        return;
      }
      tbody.innerHTML = visible.map(function (customer) {
        return `
          <tr>
            <td><strong>${escapeAdminHtml(customer.personId)}</strong></td>
            <td>${escapeAdminHtml(customer.name)}</td>
            <td>${escapeAdminHtml(customer.email)}</td>
            <td>${escapeAdminHtml(customer.phone || '-')}</td>
            <td>${escapeAdminHtml(customer.address || '-')}</td>
            <td><span class="badge">Customer</span></td>
            <td>
              <div class="actions-row">
                <button class="btn-outline" type="button" onclick="editCustomer('${escapeAdminHtml(customer.personId)}')">Edit</button>
                <button class="btn-danger" type="button" onclick="deleteCustomer('${escapeAdminHtml(customer.personId)}')">Delete</button>
              </div>
            </td>
          </tr>
        `;
      }).join('');
    }

    async function loadCustomers() {
      try {
        customers = await apiClient.get('/customers');
        renderCustomers();
      } catch (error) {
        document.getElementById('customers-body').innerHTML = '<tr><td colspan="7" class="empty-row">Cannot connect to the backend on port 8080.</td></tr>';
      }
    }

    window.editCustomer = function (id) {
      const customer = customers.find(function (item) { return item.personId === id; });
      if (!customer) return;
      document.getElementById('editing-id').value = customer.personId;
      document.getElementById('personId').value = customer.personId;
      document.getElementById('name').value = customer.name || '';
      document.getElementById('email').value = customer.email || '';
      document.getElementById('email').disabled = true;
      document.getElementById('password').value = '';
      document.getElementById('password-group').style.display = 'none';
      document.getElementById('phone').value = customer.phone || '';
      document.getElementById('address').value = customer.address || '';
      document.getElementById('form-title').textContent = 'Edit Customer';
      setFormMessage('', false);
      window.scrollTo({ top: 0, behavior: 'smooth' });
    };

    window.deleteCustomer = async function (id) {
      if (!confirm('Delete customer ' + id + '?')) return;
      try {
        await apiClient.delete('/customers/' + encodeURIComponent(id));
        await loadCustomers();
        resetForm();
        setFormMessage('Customer deleted.', false);
      } catch (error) {
        setFormMessage(error.message || 'Delete failed.', true);
      }
    };

    document.getElementById('customer-form').addEventListener('submit', async function (event) {
      event.preventDefault();
      const id = document.getElementById('editing-id').value;
      const body = {
        name: document.getElementById('name').value.trim(),
        email: document.getElementById('email').value.trim(),
        password: document.getElementById('password').value.trim(),
        phone: document.getElementById('phone').value.trim(),
        address: document.getElementById('address').value.trim()
      };
      if (!body.name || !body.phone || !body.address || (!id && (!body.email || !body.password))) {
        setFormMessage('Please fill all required fields.', true);
        return;
      }
      try {
        if (id) {
          await apiClient.put('/customers/' + encodeURIComponent(id), body);
        } else {
          await apiClient.post('/customers', body);
        }
        await loadCustomers();
        resetForm();
        setFormMessage(id ? 'Customer updated.' : 'Customer created.', false);
      } catch (error) {
        setFormMessage(error.message || 'Save failed.', true);
      }
    });

    document.getElementById('new-customer-btn').addEventListener('click', resetForm);
    document.getElementById('reset-btn').addEventListener('click', resetForm);
    document.getElementById('search').addEventListener('input', renderCustomers);
    loadCustomers();
  </script>
</body>
</html>
