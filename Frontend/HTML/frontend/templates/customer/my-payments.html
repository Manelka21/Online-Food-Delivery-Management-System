<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>My Payments</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background: #f0f4ff; }
        .navbar { background: #1a1a2e; }
        .card { border-radius: 14px; border: none; box-shadow: 0 2px 12px rgba(0,0,0,0.07); }
        .badge-COMPLETED { background: #d1f2eb; color: #0e6655; }
        .badge-PENDING   { background: #fef9e7; color: #9a7d0a; }
        .badge-FAILED    { background: #fadbd8; color: #922b21; }
        .badge-REFUNDED  { background: #d6eaf8; color: #1a5276; }
    </style>
</head>
<body>

<nav class="navbar navbar-dark px-4 py-3 mb-4">
    <span class="navbar-brand fw-bold">
        <i class="bi bi-receipt me-2"></i>My Payments
    </span>
    <a href="/customer" class="btn btn-outline-light btn-sm">
        <i class="bi bi-arrow-left me-1"></i>Back
    </a>
</nav>

<div class="container" style="max-width: 800px;">

    <div class="alert alert-info mb-4">
        <i class="bi bi-person-circle me-2"></i>
        Showing payments for Customer: <strong th:text="${customerId}"></strong>
    </div>

    <div class="card">
        <div class="card-body p-0">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-light">
                    <tr>
                        <th>Payment ID</th>
                        <th>Order ID</th>
                        <th>Type</th>
                        <th>Amount (LKR)</th>
                        <th>Status</th>
                        <th>Date</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="payment : ${payments}">
                        <td class="font-monospace small" th:text="${payment.paymentId}"></td>
                        <td th:text="${payment.orderId}"></td>
                        <td>
                            <span class="badge rounded-pill px-2"
                                  th:text="${payment.paymentType}"></span>
                        </td>
                        <td class="fw-bold" th:text="'LKR ' + ${#numbers.formatDecimal(payment.amount, 1, 2)}"></td>
                        <td>
                            <span class="badge rounded-pill px-2 py-1"
                                  th:classappend="'badge-' + ${payment.status}"
                                  th:text="${payment.status}"></span>
                        </td>
                        <td class="text-muted small" th:text="${payment.createdAt}"></td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(payments)}">
                        <td colspan="6" class="text-center text-muted py-5">
                            <i class="bi bi-inbox fs-3 d-block mb-2"></i>
                            No payments found for <strong th:text="${customerId}"></strong>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="text-center mt-4">
        <a href="/customer#paySection" class="btn btn-success">
            <i class="bi bi-plus-lg me-1"></i>Make a New Payment
        </a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
