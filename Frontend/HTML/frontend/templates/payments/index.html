<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin – Payment Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background: #f8f9fa; }
        .navbar { background: #1a1a2e; }
        .stat-card { border-radius: 12px; border: none; }
        .table-card { border-radius: 12px; border: none; box-shadow: 0 2px 12px rgba(0,0,0,0.07); }
        .badge-COMPLETED { background: #d1f2eb; color: #0e6655; }
        .badge-PENDING   { background: #fef9e7; color: #9a7d0a; }
        .badge-FAILED    { background: #fadbd8; color: #922b21; }
        .badge-REFUNDED  { background: #d6eaf8; color: #1a5276; }
        .type-CARD   { background: #e8daef; color: #6c3483; }
        .type-CASH   { background: #d5f5e3; color: #1e8449; }
        .type-ONLINE { background: #d6eaf8; color: #1a5276; }
    </style>
</head>
<body>
<nav class="navbar navbar-dark px-4 py-3 mb-4">
    <span class="navbar-brand fw-bold fs-5"><i class="bi bi-shield-lock me-2"></i>Admin – Payment Management</span>
    <a href="/customer" class="btn btn-outline-warning btn-sm"><i class="bi bi-person me-1"></i>Customer View</a>
</nav>
<div class="container-fluid px-4">
    <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
        <span th:text="${success}"></span><button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
        <span th:text="${error}"></span><button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div class="row g-3 mb-4">
        <div class="col-md-3"><div class="card stat-card bg-dark text-white p-3"><div class="small text-white-50">Total Payments</div><div class="fs-3 fw-bold" th:text="${totalCount}">0</div></div></div>
        <div class="col-md-3"><div class="card stat-card bg-success text-white p-3"><div class="small text-white-50">Completed</div><div class="fs-3 fw-bold" th:text="${completedCount}">0</div></div></div>
        <div class="col-md-3"><div class="card stat-card bg-warning p-3"><div class="small">Pending</div><div class="fs-3 fw-bold" th:text="${pendingCount}">0</div></div></div>
        <div class="col-md-3"><div class="card stat-card bg-primary text-white p-3"><div class="small text-white-50">Total Revenue (LKR)</div><div class="fs-3 fw-bold" th:text="${#numbers.formatDecimal(totalRevenue, 1, 2)}">0.00</div></div></div>
    </div>
    <div class="mb-3 d-flex gap-2 flex-wrap">
        <a href="/payments" class="btn btn-sm btn-outline-secondary">All</a>
        <a href="/payments/filter?status=PENDING" class="btn btn-sm btn-outline-warning">Pending</a>
        <a href="/payments/filter?status=COMPLETED" class="btn btn-sm btn-outline-success">Completed</a>
        <a href="/payments/filter?status=FAILED" class="btn btn-sm btn-outline-danger">Failed</a>
        <a href="/payments/filter?status=REFUNDED" class="btn btn-sm btn-outline-info">Refunded</a>
    </div>
    <div class="card table-card">
        <div class="card-body p-0">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-light">
                    <tr><th>Payment ID</th><th>Order ID</th><th>Customer ID</th><th>Type</th><th>Amount (LKR)</th><th>Status</th><th>Created At</th><th>Actions</th></tr>
                </thead>
                <tbody>
                    <tr th:each="payment : ${payments}">
                        <td class="font-monospace small" th:text="${payment.paymentId}"></td>
                        <td th:text="${payment.orderId}"></td>
                        <td th:text="${payment.customerId}"></td>
                        <td><span class="badge rounded-pill px-2 py-1" th:classappend="'type-' + ${payment.paymentType}" th:text="${payment.paymentType}"></span></td>
                        <td class="fw-semibold" th:text="${#numbers.formatDecimal(payment.amount, 1, 2)}"></td>
                        <td><span class="badge rounded-pill px-2 py-1" th:classappend="'badge-' + ${payment.status}" th:text="${payment.status}"></span></td>
                        <td class="text-muted small" th:text="${payment.createdAt}"></td>
                        <td>
                            <a th:href="@{/payments/view/{id}(id=${payment.paymentId})}" class="btn btn-sm btn-outline-secondary me-1"><i class="bi bi-eye"></i></a>
                            <a th:href="@{/payments/edit/{id}(id=${payment.paymentId})}" class="btn btn-sm btn-outline-primary me-1"><i class="bi bi-pencil"></i></a>
                            <form th:action="@{/payments/delete/{id}(id=${payment.paymentId})}" method="post" class="d-inline" onsubmit="return confirm('Delete?')">
                                <button type="submit" class="btn btn-sm btn-outline-danger"><i class="bi bi-trash"></i></button>
                            </form>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(payments)}"><td colspan="8" class="text-center text-muted py-4">No payments found.</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
