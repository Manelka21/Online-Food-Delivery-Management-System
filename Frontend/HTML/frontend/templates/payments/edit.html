<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Edit Payment</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background: #f8f9fa; }
        .form-card { border-radius: 16px; border: none; box-shadow: 0 2px 16px rgba(0,0,0,0.08); }
        .info-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #f0f0f0; }
    </style>
</head>
<body>
<div class="container py-5" style="max-width: 550px;">
    <div class="d-flex align-items-center mb-4">
        <a href="/payments" class="btn btn-sm btn-outline-secondary me-3">
            <i class="bi bi-arrow-left"></i>
        </a>
        <h4 class="mb-0 fw-bold">Edit Payment</h4>
    </div>

    <div class="card form-card p-4">
        <!-- Show existing info (read-only) -->
        <div class="mb-4">
            <p class="text-muted small mb-2 fw-semibold text-uppercase">Current Details</p>
            <div class="info-row">
                <span class="text-muted">Payment ID</span>
                <span class="font-monospace small fw-bold" th:text="${payment.paymentId}"></span>
            </div>
            <div class="info-row">
                <span class="text-muted">Order ID</span>
                <span th:text="${payment.orderId}"></span>
            </div>
            <div class="info-row">
                <span class="text-muted">Type</span>
                <span th:text="${payment.paymentType}"></span>
            </div>
            <div class="info-row">
                <span class="text-muted">Amount</span>
                <span class="fw-bold" th:text="'LKR ' + ${#numbers.formatDecimal(payment.amount, 1, 2)}"></span>
            </div>
            <div class="info-row" style="border-bottom:none;">
                <span class="text-muted">Current Status</span>
                <span class="badge bg-secondary" th:text="${payment.status}"></span>
            </div>
        </div>

        <!-- Edit form — only status can be changed -->
        <form th:action="@{/payments/edit/{id}(id=${payment.paymentId})}" method="post">
            <div class="mb-3">
                <label class="form-label fw-semibold">Update Status</label>
                <select class="form-select" name="status" required>
                    <option value="PENDING"   th:selected="${payment.status == 'PENDING'}">Pending</option>
                    <option value="COMPLETED" th:selected="${payment.status == 'COMPLETED'}">Completed</option>
                    <option value="FAILED"    th:selected="${payment.status == 'FAILED'}">Failed</option>
                    <option value="REFUNDED"  th:selected="${payment.status == 'REFUNDED'}">Refunded</option>
                </select>
            </div>
            <div class="d-grid">
                <button type="submit" class="btn btn-primary fw-semibold py-2">
                    <i class="bi bi-check-lg me-1"></i>Update Payment
                </button>
            </div>
        </form>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
