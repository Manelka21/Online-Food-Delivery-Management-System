<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>View Payment</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background: #f8f9fa; }
        .detail-card { border-radius: 16px; border: none; box-shadow: 0 2px 16px rgba(0,0,0,0.08); }
        .detail-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #f5f5f5; }
        .detail-row:last-child { border-bottom: none; }
    </style>
</head>
<body>
<div class="container py-5" style="max-width: 550px;">
    <div class="d-flex align-items-center mb-4">
        <a href="/payments" class="btn btn-sm btn-outline-secondary me-3">
            <i class="bi bi-arrow-left"></i>
        </a>
        <h4 class="mb-0 fw-bold">Payment Details</h4>
    </div>

    <div class="card detail-card p-4">
        <div class="detail-row">
            <span class="text-muted">Payment ID</span>
            <span class="font-monospace fw-bold" th:text="${payment.paymentId}"></span>
        </div>
        <div class="detail-row">
            <span class="text-muted">Order ID</span>
            <span th:text="${payment.orderId}"></span>
        </div>
        <div class="detail-row">
            <span class="text-muted">Payment Type</span>
            <span th:text="${payment.paymentType}"></span>
        </div>
        <div class="detail-row">
            <span class="text-muted">Amount</span>
            <span class="fw-bold fs-5" th:text="'LKR ' + ${#numbers.formatDecimal(payment.amount, 1, 2)}"></span>
        </div>
        <div class="detail-row">
            <span class="text-muted">Status</span>
            <span class="badge fs-6" th:text="${payment.status}"
                  th:classappend="${payment.status == 'COMPLETED'} ? 'bg-success' :
                                   (${payment.status == 'PENDING'}  ? 'bg-warning text-dark' :
                                   (${payment.status == 'FAILED'}   ? 'bg-danger' : 'bg-info'))">
            </span>
        </div>
        <div class="detail-row">
            <span class="text-muted">Processing Info</span>
            <span class="text-muted small" th:text="${payment.processPayment()}"></span>
        </div>
        <div class="detail-row">
            <span class="text-muted">Created At</span>
            <span th:text="${payment.createdAt}"></span>
        </div>
    </div>

    <div class="d-flex gap-2 mt-3">
        <a th:href="@{/payments/edit/{id}(id=${payment.paymentId})}"
           class="btn btn-primary flex-grow-1">
            <i class="bi bi-pencil me-1"></i>Edit
        </a>
        <form th:action="@{/payments/delete/{id}(id=${payment.paymentId})}"
              method="post" onsubmit="return confirm('Delete this payment?')">
            <button type="submit" class="btn btn-outline-danger">
                <i class="bi bi-trash me-1"></i>Delete
            </button>
        </form>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
