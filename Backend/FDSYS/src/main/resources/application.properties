# [L3] 📁 FILE: application.properties
# 🏗 LAYER: Configuration — Environment Properties
# 📋 ROLE: Centralizes variable settings allowing the application to be configured without changing Java code.
# 🔗 USED BY: Spring Boot runtime (@Value injections)

# [L1] Sets the local web server port to 8080 (the default for web development)
server.port=8080

# [L2] Custom property defining where the TXT "database" files are stored.
# This allows the developer to change the data folder location easily without changing FileUtil.java.
data.directory=data/

# [L2] Jackson JSON Configuration. 
# non_null prevents the API from sending "null" values in JSON responses, 
# resulting in cleaner payloads, smaller network transfers, and fewer frontend errors.
spring.jackson.default-property-inclusion=non_null