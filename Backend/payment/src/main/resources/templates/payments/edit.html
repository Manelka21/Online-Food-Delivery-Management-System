<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Edit Payment</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f8f8f8; font-family: 'Segoe UI', sans-serif; }
        .navbar-custom { background: #1a1a1a; padding: 16px 40px; display: flex; justify-content: space-between; align-items: center; }
        .navbar-brand-custom { font-size: 20px; font-weight: 800; color: white; }
        .navbar-brand-custom span { color: #06C167; }
        .btn-back { background: white; color: #1a1a1a; border: none; padding: 8px 20px; border-radius: 999px; font-size: 13px; font-weight: 600; text-decoration: none; }
        .content { max-width: 520px; margin: 40px auto; padding: 0 20px; }
        .form-card { background: white; border-radius: 20px; padding: 36px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        .form-card h5 { font-size: 20px; font-weight: 800; margin-bottom: 24px; }
        .info-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #f5f5f5; font-size: 14px; }
        .info-row:last-of-type { border-bottom: none; margin-bottom: 20px; }
        .info-label { color: #888; }
        .info-value { font-weight: 600; }
        .form-label { font-weight: 600; font-size: 13px; color: #444; }
        .form-select { border-radius: 12px; border: 2px solid #eee; padding: 12px 16px; font-size: 14px; }
        .form-select:focus { border-color: #06C167; box-shadow: none; }
        .btn-green { background: #06C167; color: white; border: none; border-radius: 999px; padding: 13px 28px; font-weight: 700; font-size: 14px; width: 100%; }
        .btn-green:hover { background: #05a856; }
    </style>
</head>
<body>
<div class="navbar-custom">
    <div class="navbar-brand-custom">Food<span>Delivery</span></div>
    <a href="/payments" class="btn-back">← Back to Dashboard</a>
</div>
<div class="content">
    <div class="form-card">
        <h5>✏️ Update Payment Status</h5>
        <div class="info-row"><span class="info-label">Payment ID</span><span class="info-value font-monospace small" th:text="${payment.paymentId}"></span></div>
        <div class="info-row"><span class="info-label">Order ID</span><span class="info-value" th:text="${payment.orderId}"></span></div>
        <div class="info-row"><span class="info-label">Customer ID</span><span class="info-value" th:text="${payment.customerId}"></span></div>
        <div class="info-row"><span class="info-label">Amount</span><span class="info-value" th:text="'LKR ' + ${#numbers.formatDecimal(payment.amount,1,2)}"></span></div>
        <div class="info-row"><span class="info-label">Type</span><span class="info-value" th:text="${payment.paymentType}"></span></div>

        <form th:action="@{/payments/edit/{id}(id=${payment.paymentId})}" method="post">
            <div class="mb-4">
                <label class="form-label">Update Status</label>
                <select class="form-select" name="status" required>
                    <option value="PENDING"   th:selected="${payment.status == 'PENDING'}">⏳ Pending</option>
                    <option value="COMPLETED" th:selected="${payment.status == 'COMPLETED'}">✅ Completed</option>
                    <option value="FAILED"    th:selected="${payment.status == 'FAILED'}">❌ Failed</option>
                    <option value="REFUNDED"  th:selected="${payment.status == 'REFUNDED'}">↩️ Refunded</option>
                </select>
            </div>
            <button type="submit" class="btn-green">Update Payment →</button>
        </form>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
