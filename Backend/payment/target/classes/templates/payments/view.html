<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>View Payment</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f8f8f8; font-family: 'Segoe UI', sans-serif; }
        .navbar-custom { background: #1a1a1a; padding: 16px 40px; display: flex; justify-content: space-between; align-items: center; }
        .navbar-brand-custom { font-size: 20px; font-weight: 800; color: white; }
        .navbar-brand-custom span { color: #06C167; }
        .btn-back { background: white; color: #1a1a1a; border: none; padding: 8px 20px; border-radius: 999px; font-size: 13px; font-weight: 600; text-decoration: none; }
        .content { max-width: 520px; margin: 40px auto; padding: 0 20px; }
        .detail-card { background: white; border-radius: 20px; padding: 36px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        .detail-card h5 { font-size: 20px; font-weight: 800; margin-bottom: 24px; }
        .detail-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #f5f5f5; font-size: 14px; }
        .detail-row:last-of-type { border-bottom: none; }
        .detail-label { color: #888; }
        .detail-value { font-weight: 600; }
        .amount-big { font-size: 28px; font-weight: 800; color: #06C167; }
        .status-COMPLETED { background: #f0fdf6; color: #06C167; padding: 5px 14px; border-radius: 999px; font-size: 12px; font-weight: 700; }
        .status-PENDING   { background: #fffbeb; color: #f59e0b; padding: 5px 14px; border-radius: 999px; font-size: 12px; font-weight: 700; }
        .status-FAILED    { background: #fff1f2; color: #e11d48; padding: 5px 14px; border-radius: 999px; font-size: 12px; font-weight: 700; }
        .status-REFUNDED  { background: #eff6ff; color: #3b82f6; padding: 5px 14px; border-radius: 999px; font-size: 12px; font-weight: 700; }
        .btn-black { background: #1a1a1a; color: white; border: none; border-radius: 999px; padding: 12px 28px; font-weight: 700; font-size: 14px; text-decoration: none; }
        .btn-black:hover { background: #333; color: white; }
        .btn-outline-danger-custom { background: white; color: #e11d48; border: 2px solid #e11d48; border-radius: 999px; padding: 12px 28px; font-weight: 700; font-size: 14px; }
    </style>
</head>
<body>
<div class="navbar-custom">
    <div class="navbar-brand-custom">Food<span>Delivery</span></div>
    <a href="/payments" class="btn-back">← Back</a>
</div>
<div class="content">
    <div class="detail-card">
        <h5>💳 Payment Details</h5>
        <div class="detail-row"><span class="detail-label">Payment ID</span><span class="detail-value font-monospace small" th:text="${payment.paymentId}"></span></div>
        <div class="detail-row"><span class="detail-label">Order ID</span><span class="detail-value" th:text="${payment.orderId}"></span></div>
        <div class="detail-row"><span class="detail-label">Customer ID</span><span class="detail-value" th:text="${payment.customerId}"></span></div>
        <div class="detail-row"><span class="detail-label">Payment Type</span><span class="detail-value" th:text="${payment.paymentType}"></span></div>
        <div class="detail-row">
            <span class="detail-label">Amount</span>
            <span class="amount-big" th:text="'LKR ' + ${#numbers.formatDecimal(payment.amount,1,2)}"></span>
        </div>
        <div class="detail-row">
            <span class="detail-label">Status</span>
            <span th:classappend="'status-' + ${payment.status}" th:text="${payment.status}"></span>
        </div>
        <div class="detail-row"><span class="detail-label">Processing Info</span><span class="detail-value small text-muted" th:text="${payment.processPayment()}"></span></div>
        <div class="detail-row"><span class="detail-label">Created At</span><span class="detail-value text-muted" th:text="${payment.createdAt}"></span></div>

        <div class="d-flex gap-3 mt-4">
            <a th:href="@{/payments/edit/{id}(id=${payment.paymentId})}" class="btn-black flex-grow-1 text-center">✏️ Edit Status</a>
            <form th:action="@{/payments/delete/{id}(id=${payment.paymentId})}" method="post" onsubmit="return confirm('Delete?')">
                <button type="submit" class="btn-outline-danger-custom">🗑️ Delete</button>
            </form>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
